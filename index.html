<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
    />
    <title>VŨ HÀ LAN</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@200;300;400&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --pink: #f2a7c3;
        --pink-deep: #e07fa0;
        --pink-soft: #fcd5e5;
        --blush: #fde8f0;
        --lavender: #e8d5f5;
        --sky: #d5eaf5;
        --cream: #fff8fb;
        --text: #5a3548;
        --text-soft: #9b6e85;
        --text-muted: #c4a0b5;
        --white: #ffffff;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      html,
      body {
        width: 100%;
        min-height: 100vh;
        font-family: "DM Sans", sans-serif;
        overflow-x: hidden;
        background: var(--cream);
      }

      /* Animated gradient background */
      .bg {
        position: fixed;
        inset: 0;
        background:
          radial-gradient(
            ellipse 90% 70% at 20% 0%,
            rgba(242, 167, 195, 0.35) 0%,
            transparent 55%
          ),
          radial-gradient(
            ellipse 70% 60% at 85% 15%,
            rgba(232, 213, 245, 0.4) 0%,
            transparent 50%
          ),
          radial-gradient(
            ellipse 80% 50% at 50% 100%,
            rgba(213, 234, 245, 0.3) 0%,
            transparent 55%
          ),
          radial-gradient(
            ellipse 60% 40% at 10% 70%,
            rgba(253, 216, 229, 0.25) 0%,
            transparent 50%
          ),
          var(--cream);
        animation: bgShift 8s ease-in-out infinite alternate;
        z-index: 0;
      }

      @keyframes bgShift {
        0% {
          filter: hue-rotate(0deg) brightness(1);
        }
        100% {
          filter: hue-rotate(8deg) brightness(1.02);
        }
      }

      /* Floating blobs */
      .blobs {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        overflow: hidden;
      }

      .blob {
        position: absolute;
        border-radius: 50%;
        filter: blur(50px);
        opacity: 0.25;
        animation: blobFloat ease-in-out infinite;
      }

      .blob-1 {
        width: 280px;
        height: 280px;
        background: var(--pink-soft);
        top: -80px;
        left: -60px;
        animation-duration: 12s;
      }
      .blob-2 {
        width: 200px;
        height: 200px;
        background: var(--lavender);
        top: 20%;
        right: -60px;
        animation-duration: 15s;
        animation-delay: -4s;
      }
      .blob-3 {
        width: 240px;
        height: 240px;
        background: var(--sky);
        bottom: 15%;
        left: -40px;
        animation-duration: 10s;
        animation-delay: -7s;
      }
      .blob-4 {
        width: 180px;
        height: 180px;
        background: var(--blush);
        bottom: -60px;
        right: -30px;
        animation-duration: 14s;
        animation-delay: -2s;
      }

      @keyframes blobFloat {
        0%,
        100% {
          transform: translate(0, 0) scale(1);
        }
        33% {
          transform: translate(20px, -20px) scale(1.05);
        }
        66% {
          transform: translate(-15px, 15px) scale(0.97);
        }
      }

      /* Petal rain */
      .petals {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        overflow: hidden;
      }

      .petal {
        position: absolute;
        top: -20px;
        border-radius: 50% 0 50% 0;
        opacity: 0;
        animation: petalFall linear infinite;
      }

      @keyframes petalFall {
        0% {
          opacity: 0;
          transform: translateY(-20px) rotate(0deg);
        }
        10% {
          opacity: 0.6;
        }
        90% {
          opacity: 0.3;
        }
        100% {
          opacity: 0;
          transform: translateY(100vh) rotate(360deg) translateX(40px);
        }
      }

      /* Container */
      .container {
        position: relative;
        z-index: 1;
        max-width: 420px;
        margin: 0 auto;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 0 26px 70px;
      }

      /* Top ribbon */
      .ribbon {
        width: 100%;
        height: 3px;
        background: linear-gradient(
          90deg,
          var(--lavender),
          var(--pink),
          var(--pink-soft),
          var(--sky)
        );
        background-size: 200% auto;
        animation: rainbowSlide 4s linear infinite;
        flex-shrink: 0;
      }

      @keyframes rainbowSlide {
        0% {
          background-position: 0% center;
        }
        100% {
          background-position: 200% center;
        }
      }

      /* Avatar ring */
      .avatar-wrap {
        margin-top: 52px;
        position: relative;
        width: 120px;
        height: 120px;
        opacity: 0;
        animation: popIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s forwards;
      }

      @keyframes popIn {
        0% {
          opacity: 0;
          transform: scale(0.5);
        }
        100% {
          opacity: 1;
          transform: scale(1);
        }
      }

      .avatar-ring-outer {
        position: absolute;
        inset: -10px;
        border-radius: 50%;
        background: conic-gradient(
          from 0deg,
          var(--pink),
          var(--lavender),
          var(--sky),
          var(--pink-soft),
          var(--pink)
        );
        animation: rotateFull 6s linear infinite;
        opacity: 0.6;
      }

      @keyframes rotateFull {
        to {
          transform: rotate(360deg);
        }
      }

      .avatar-ring-mask {
        position: absolute;
        inset: -7px;
        border-radius: 50%;
        background: var(--cream);
      }

      .avatar-inner {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        background: linear-gradient(
          135deg,
          var(--blush),
          var(--pink-soft),
          var(--lavender)
        );
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        box-shadow: 0 8px 30px rgba(242, 167, 195, 0.4);
      }

      .avatar-monogram {
        font-family: "Playfair Display", serif;
        font-size: 36px;
        font-weight: 300;
        font-style: italic;
        color: var(--text);
        letter-spacing: 1px;
      }

      /* Floating hearts around avatar */
      .heart {
        position: absolute;
        font-size: 14px;
        animation: floatHeart ease-in-out infinite;
        pointer-events: none;
      }

      .heart-1 {
        top: -8px;
        right: 8px;
        animation-duration: 3s;
        animation-delay: 0s;
      }
      .heart-2 {
        bottom: 4px;
        left: -8px;
        font-size: 10px;
        animation-duration: 4s;
        animation-delay: -1.5s;
      }
      .heart-3 {
        top: 10px;
        left: -12px;
        font-size: 8px;
        animation-duration: 3.5s;
        animation-delay: -0.8s;
      }

      @keyframes floatHeart {
        0%,
        100% {
          transform: translateY(0) scale(1);
          opacity: 0.7;
        }
        50% {
          transform: translateY(-8px) scale(1.2);
          opacity: 1;
        }
      }

      /* Name */
      .name-section {
        text-align: center;
        margin-top: 24px;
        opacity: 0;
        animation: fadeSlideUp 0.8s ease 0.6s forwards;
      }

      .name-tag {
        display: inline-block;
        font-size: 9px;
        letter-spacing: 4px;
        text-transform: uppercase;
        color: var(--pink-deep);
        font-weight: 400;
        margin-bottom: 8px;
        opacity: 0.8;
      }

      .name-main {
        font-family: "Playfair Display", serif;
        font-size: 34px;
        font-weight: 300;
        font-style: italic;
        color: var(--text);
        letter-spacing: 3px;
        line-height: 1.15;
      }

      .name-main strong {
        font-style: normal;
        font-weight: 400;
        color: var(--pink-deep);
      }

      /* Floral divider */
      .floral-divider {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 20px 0;
        width: 70%;
        opacity: 0;
        animation: fadeSlideUp 0.7s ease 0.8s forwards;
      }

      .fl-line {
        flex: 1;
        height: 1px;
        background: linear-gradient(90deg, transparent, var(--pink));
      }

      .fl-line.r {
        background: linear-gradient(90deg, var(--pink), transparent);
      }
      .fl-center {
        font-size: 16px;
      }

      /* Bio card */
      .bio-card {
        width: 100%;
        background: rgba(255, 255, 255, 0.65);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(242, 167, 195, 0.3);
        border-radius: 20px;
        padding: 20px 22px;
        text-align: center;
        box-shadow:
          0 4px 24px rgba(242, 167, 195, 0.15),
          inset 0 1px 0 rgba(255, 255, 255, 0.8);
        margin-bottom: 28px;
        opacity: 0;
        animation: fadeSlideUp 0.8s ease 1s forwards;
      }

      .bio-text {
        font-family: "Playfair Display", serif;
        font-size: 15px;
        font-weight: 300;
        font-style: italic;
        color: var(--text-soft);
        line-height: 1.8;
      }

      .bio-text .highlight {
        color: var(--pink-deep);
        font-style: normal;
        font-weight: 400;
      }

      /* Section */
      .section-tag {
        font-size: 8px;
        letter-spacing: 4px;
        text-transform: uppercase;
        color: var(--text-muted);
        font-weight: 400;
        margin-bottom: 14px;
        width: 100%;
        text-align: center;
        opacity: 0;
        animation: fadeSlideUp 0.7s ease 1.1s forwards;
      }

      /* Social cards */
      .socials {
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .social-card {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 14px 18px;
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(242, 167, 195, 0.2);
        border-radius: 16px;
        text-decoration: none;
        box-shadow:
          0 2px 16px rgba(242, 167, 195, 0.1),
          inset 0 1px 0 rgba(255, 255, 255, 0.9);
        transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
        opacity: 0;
        position: relative;
        overflow: hidden;
      }

      .social-card::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          135deg,
          rgba(242, 167, 195, 0.15),
          rgba(232, 213, 245, 0.1)
        );
        opacity: 0;
        transition: opacity 0.3s ease;
        border-radius: inherit;
      }

      .social-card:hover::before,
      .social-card:active::before {
        opacity: 1;
      }

      .social-card:hover,
      .social-card:active {
        transform: translateY(-4px) scale(1.01);
        box-shadow:
          0 10px 30px rgba(242, 167, 195, 0.25),
          inset 0 1px 0 rgba(255, 255, 255, 0.9);
        border-color: rgba(242, 167, 195, 0.45);
      }

      .social-card:nth-child(1) {
        animation: fadeSlideUp 0.7s ease 1.2s forwards;
      }
      .social-card:nth-child(2) {
        animation: fadeSlideUp 0.7s ease 1.35s forwards;
      }
      .social-card:nth-child(3) {
        animation: fadeSlideUp 0.7s ease 1.5s forwards;
      }

      .icon-wrap {
        width: 44px;
        height: 44px;
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        transition: transform 0.3s ease;
      }

      .social-card:hover .icon-wrap {
        transform: rotate(-6deg) scale(1.1);
      }

      .icon-fb {
        background: linear-gradient(135deg, #a8d8f0, #c5d8f5);
      }
      .icon-tt {
        background: linear-gradient(135deg, #f5c0d0, #e8b0e0);
      }
      .icon-ig {
        background: linear-gradient(135deg, #ffd0c0, #ffb5d0, #d0b0f0);
      }

      .icon-wrap svg {
        width: 20px;
        height: 20px;
        fill: white;
        filter: drop-shadow(0 1px 2px rgba(0, 0, 0, 0.15));
      }

      .social-info {
        flex: 1;
      }

      .social-platform {
        font-size: 8px;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: var(--text-muted);
        font-weight: 400;
        margin-bottom: 2px;
      }

      .social-handle {
        font-family: "Playfair Display", serif;
        font-size: 16px;
        font-weight: 400;
        color: var(--text);
        letter-spacing: 0.5px;
      }

      .arrow-btn {
        width: 30px;
        height: 30px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--pink-soft), var(--blush));
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        font-size: 13px;
        color: var(--pink-deep);
        transition: all 0.3s ease;
      }

      .social-card:hover .arrow-btn {
        background: linear-gradient(135deg, var(--pink), var(--pink-soft));
        color: white;
      }

      /* Footer */
      .footer {
        margin-top: 44px;
        text-align: center;
        opacity: 0;
        animation: fadeSlideUp 0.7s ease 1.7s forwards;
      }

      .footer-flower {
        font-size: 22px;
        display: block;
        margin-bottom: 8px;
        animation: spinSlow 8s linear infinite;
      }
      @keyframes spinSlow {
        to {
          transform: rotate(360deg);
        }
      }

      .footer-text {
        font-size: 9px;
        letter-spacing: 4px;
        text-transform: uppercase;
        color: var(--text-muted);
        font-weight: 300;
      }

      /* Shared animation */
      @keyframes fadeSlideUp {
        from {
          opacity: 0;
          transform: translateY(18px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>

        </p>
      </div>

      <!-- Section -->
      <div class="section-tag">✦ &nbsp; kết nối với mình &nbsp; ✦</div>

      <!-- Socials -->

              />

          </div>
          <div class="social-info">
            <div class="social-platform">TikTok</div>

      <!-- Footer -->

        <span class="footer-flower">✿</span>
        <div class="footer-text">made with love · vũ hà lan</div>
      </div>
    </div>

    <script>
      // Petal rain
      const petalContainer = document.getElementById("petals");
      const petalEmojis = ["🌸", "🌷", "✿", "꩜", "❀"];

      function createPetal() {
        const p = document.createElement("div");
        p.classList.add("petal");
        p.style.left = Math.random() * 100 + "vw";
        p.style.fontSize = Math.random() * 10 + 8 + "px";
        p.textContent =
          petalEmojis[Math.floor(Math.random() * petalEmojis.length)];
        const dur = Math.random() * 8 + 8;
        const delay = Math.random() * 5;
        p.style.animationDuration = dur + "s";
        p.style.animationDelay = delay + "s";
        petalContainer.appendChild(p);
        setTimeout(() => p.remove(), (dur + delay) * 1000);
      }

      for (let i = 0; i < 10; i++) setTimeout(createPetal, i * 600);
      setInterval(createPetal, 1200);

      // Touch bounce
      document.querySelectorAll(".social-card").forEach((card) => {
        card.addEventListener(
          "touchstart",
          () => (card.style.transform = "translateY(-4px) scale(1.01)"),
        );
        card.addEventListener("touchend", () => (card.style.transform = ""));
      });
    </script>
  </body>
</html>
